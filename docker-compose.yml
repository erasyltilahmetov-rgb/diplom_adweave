name: adweave

services:

  # ── Django App ─────────────────────────────────────────────
  web:
    build: .
    container_name: adweave_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=qwen2.5:3b
      - THREADS_DB_PATH=/data/posts.db
    env_file:
      - .env
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./posts_dataset.db:/data/posts.db:ro
      - ./data/browser_profile:/data/browser_profile
      - adweave_static:/app/staticfiles
      # Код монтируется напрямую — docker cp больше не нужен
      - ./ai_generator:/app/ai_generator
      - ./templates:/app/templates
      - ./static:/app/static
    depends_on:
      ollama:
        condition: service_healthy

  # ── Ollama (AI) ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: adweave_ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Раскомментируй для NVIDIA GPU (RTX 5060):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Ollama model loader (запускается один раз) ─────────────
  ollama-loader:
    image: ollama/ollama:latest
    container_name: adweave_ollama_loader
    restart: "no"
    volumes:
      - ollama_models:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Скачиваю модель qwen2.5:3b...' &&
        OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5:3b &&
        echo 'Модель готова!'
      "

  # ── Cloudflare Quick Tunnel (HTTPS без аккаунта) ───────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: adweave_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://web:8000
    depends_on:
      - web

volumes:
  ollama_models:
  adweave_static:
