{% extends "base.html" %}

{% block title %}Удаление аккаунта — AdWeave{% endblock %}

{% block content %}
<section class="dashboard">
  <div class="container">
    <div class="dashboard__header">
      <div>
        <h1 class="dashboard__title">Удалить @{{ account.username }}?</h1>
        <p class="dashboard__subtitle">Это действие нельзя отменить.</p>
      </div>
    </div>

    <section class="panel" style="max-width: 520px;">
      <form method="post">
        {% csrf_token %}
        <div class="compose-actions">
          <button class="btn btn--primary" type="submit" data-i18n="acc.delete">Удалить</button>
          <a class="btn btn--outline" href="{% url 'accounts' %}" data-i18n="g.cancel">Отмена</a>
        </div>
      </form>
    </section>
  </div>
</section>
{% endblock %}
