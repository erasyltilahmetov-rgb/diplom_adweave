{% load static %}
<footer id="contacts" class="footer">
  <div class="container footer__grid">
    <div class="footer__brand">
      <div class="footer__logo">
        <img class="brand-logo" src="{% static 'img/logo.png' %}" alt="AdWeave">
        <span class="navbar__name">AdWeave</span>
      </div>
      <p class="footer__text">
        ADWEAVE — интеллектуальная платформа для автоматизации маркетинга в Threads: AI-тексты, расписание публикаций и аналитика.
      </p>
      <div class="footer__socials">
        <a href="#" aria-label="Telegram">TG</a>
        <a href="#" aria-label="Instagram">IG</a>
        <a href="#" aria-label="LinkedIn">IN</a>
      </div>
    </div>

    <div class="footer__col">
      <p class="footer__title" data-i18n="footer.product">Product</p>
      <a href="#features" data-i18n="footer.features">Features</a>
      <a href="{% url 'pricing' %}" data-i18n="footer.pricing">Pricing</a>
      <a href="#" data-i18n="footer.updates">Updates</a>
    </div>

    <div class="footer__col">
      <p class="footer__title" data-i18n="footer.company">Company</p>
      <a href="#" data-i18n="footer.about">About</a>
      <a href="#" data-i18n="footer.careers">Careers</a>
      <a href="{% url 'contacts' %}" data-i18n="footer.contacts">Contacts</a>
    </div>

    <div class="footer__col">
      <p class="footer__title" data-i18n="footer.support">Support</p>
      <a href="#" data-i18n="footer.help">Help center</a>
      <a href="#" data-i18n="footer.terms">Terms</a>
      <a href="/privacy/" data-i18n="footer.privacy">Privacy</a>
    </div>
  </div>

  <div class="container footer__bottom">
    <span>© 2026 ADWEAVE</span>
    <div class="footer__bottom-links">
      <a href="#" data-i18n="footer.terms">Terms</a>
      <a href="/privacy/" data-i18n="footer.privacy">Privacy</a>
    </div>
    <div class="footer__controls">
      <select class="lang-select" id="langSelect" aria-label="Язык">
        <option value="ru">RU</option>
        <option value="en">EN</option>
        <option value="kz">KZ</option>
      </select>
      <button class="theme-toggle" type="button" id="themeToggle" aria-label="Переключить тему">
        <span class="theme-toggle__icon">🌙</span>
        <span class="theme-toggle__text">Темная</span>
      </button>
    </div>
  </div>
</footer>
